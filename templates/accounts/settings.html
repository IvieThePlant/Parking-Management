<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings</title>
</head>
<body>

  <img src="https://web.augsburg.edu/marcomm/logo/Augsburg_A_1-color_Maroon.jpg" alt="Augsburg" height="40">

  <h1>Settings</h1>
  <p>Hello {{ user.first_name }}</p>

  <h2>Change Name</h2>
  <form method="POST" action="{% url 'change_name' %}">
    {% csrf_token %}
    <input type="text" name="name" value="{{ user.first_name }}" placeholder="New name">
    <button type="submit">Update Name</button>
  </form>

  <h2>Change Password</h2>
  <form method="POST" action="{% url 'change_password' %}">
    {% csrf_token %}
    <input type="password" name="old_password" placeholder="Current password">
    <input type="password" name="new_password1" placeholder="New password">
    <input type="password" name="new_password2" placeholder="Confirm new password">
    <button type="submit">Update Password</button>
  </form>

  <h2>Delete Account</h2>
  <form method="POST" action="{% url 'delete_account' %}">
    {% csrf_token %}
    <button type="submit" onclick="return confirm('Are you sure? This cannot be undone.')">
      Delete Account
    </button>
  </form>
  <br>

  <a href="{% url 'dashboard' %}">← Back to Dashboard</a>

</body>
</html>
